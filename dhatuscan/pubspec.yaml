name: dhatuscan
description: DhatuScan - Ayurvedic Health Assessment App based on the 7 Dhatus
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_fonts: ^6.1.0
  provider: ^6.1.1
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_otp_text_field: ^1.1.2
  intl: ^0.18.1
  fl_chart: ^0.66.2
  lottie: ^3.0.0
  pinput: ^3.0.1
  fluttertoast: ^8.2.4
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
